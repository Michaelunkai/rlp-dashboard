<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RLP Dashboard</title>
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── RESET & CUSTOM PROPS ─────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080812;
  --bg2:#0f0f1e;
  --bg3:#0a0a1a;
  --bg4:#13132a;
  --bg5:#1a1a38;
  --border:rgba(124,58,237,0.15);
  --border2:rgba(124,58,237,0.3);
  --border3:rgba(124,58,237,0.5);
  --text:#e8e8f0;
  --text2:#a0a0c0;
  --muted:#5a5a7a;
  --accent:#7c3aed;
  --accent2:#6d28d9;
  --accent3:#5b21b6;
  --accent-glow:rgba(124,58,237,0.25);
  --green:#22c55e;
  --green-dim:rgba(34,197,94,0.15);
  --yellow:#eab308;
  --yellow-dim:rgba(234,179,8,0.15);
  --red:#ef4444;
  --red-dim:rgba(239,68,68,0.15);
  --blue:#3b82f6;
  --blue-dim:rgba(59,130,246,0.15);
  --radius-sm:6px;
  --radius:10px;
  --radius-lg:14px;
  --shadow:0 4px 24px rgba(0,0,0,0.4);
  --shadow-accent:0 4px 20px rgba(124,58,237,0.2);
  --font:'Inter',system-ui,-apple-system,sans-serif;
  --font-mono:'JetBrains Mono','Fira Code','Cascadia Code','Courier New',monospace;
  --topbar-h:52px;
  --toolbar-h:48px;
  --sidebar-w:220px;
}

html{height:100%}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  font-size:13px;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

/* ── SCROLLBARS ───────────────────────────────────────────────────────────── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}

/* ── OFFLINE BANNER ───────────────────────────────────────────────────────── */
#offline-banner{
  display:none;
  background:linear-gradient(90deg,#7f1d1d,#991b1b);
  color:#fca5a5;
  text-align:center;
  padding:6px 12px;
  font-size:12px;
  font-weight:500;
  letter-spacing:0.02em;
  flex-shrink:0;
  z-index:200;
}
#offline-banner.vis{display:block}

/* ── TOP BAR ──────────────────────────────────────────────────────────────── */
#topbar{
  background:linear-gradient(180deg,#0d0d22 0%,#0a0a18 100%);
  border-bottom:1px solid var(--border2);
  padding:0 16px;
  display:flex;
  align-items:center;
  gap:10px;
  flex-shrink:0;
  height:var(--topbar-h);
  position:relative;
  z-index:100;
}

#hamburger{
  background:none;
  border:none;
  color:var(--text2);
  cursor:pointer;
  padding:6px;
  border-radius:var(--radius-sm);
  display:flex;
  align-items:center;
  justify-content:center;
  transition:color 0.15s,background 0.15s;
  flex-shrink:0;
}
#hamburger:hover{color:var(--text);background:var(--bg5)}
#hamburger svg{display:block}

#topbar-logo{
  display:flex;
  align-items:center;
  gap:8px;
  white-space:nowrap;
  flex-shrink:0;
}
#topbar-logo svg{flex-shrink:0}
#topbar-logo h1{
  font-size:15px;
  font-weight:700;
  background:linear-gradient(135deg,#a78bfa,#7c3aed,#6d28d9);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:-0.02em;
}

.stat-pill{
  display:flex;
  align-items:center;
  gap:5px;
  background:var(--bg4);
  border:1px solid var(--border);
  padding:4px 10px;
  border-radius:99px;
  font-size:11px;
  font-weight:500;
  white-space:nowrap;
  color:var(--text2);
  transition:border-color 0.2s;
}
.stat-pill:hover{border-color:var(--border2)}
.stat-pill .pill-val{font-weight:700;font-size:12px}
.stat-pill.green{border-color:rgba(34,197,94,0.25)}
.stat-pill.green .pill-val{color:var(--green)}
.stat-pill.blue{border-color:rgba(59,130,246,0.25)}
.stat-pill.blue .pill-val{color:var(--blue)}

#topbar-progress{
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
}
#bar-wrap{
  width:90px;
  height:6px;
  background:var(--bg5);
  border-radius:99px;
  overflow:hidden;
}
#bar-fill{
  height:100%;
  border-radius:99px;
  transition:width 0.5s ease,background 0.5s;
  background:var(--accent);
}
#bar-pct{
  font-size:12px;
  font-weight:700;
  color:var(--accent);
  min-width:34px;
  font-variant-numeric:tabular-nums;
}

.conn-indicator{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:11px;
  font-weight:500;
  color:var(--text2);
}
#dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--muted);
  flex-shrink:0;
  transition:background 0.3s;
}
#dot.live{background:var(--green);box-shadow:0 0 6px rgba(34,197,94,0.6);animation:pulse-green 2s infinite}
#dot.poll{background:var(--yellow);box-shadow:0 0 6px rgba(234,179,8,0.5)}
#dot.dead{background:var(--red);box-shadow:0 0 6px rgba(239,68,68,0.4)}
@keyframes pulse-green{0%,100%{box-shadow:0 0 4px rgba(34,197,94,0.4)}50%{box-shadow:0 0 10px rgba(34,197,94,0.8)}}

.spill{flex:1;min-width:8px}

.tb-icon{
  background:var(--bg4);
  border:1px solid var(--border);
  color:var(--text2);
  padding:0;
  width:32px;
  height:32px;
  border-radius:var(--radius-sm);
  cursor:pointer;
  font-size:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all 0.15s;
  flex-shrink:0;
  white-space:nowrap;
}
.tb-icon:hover{background:var(--bg5);border-color:var(--border2);color:var(--text)}
#gh-btn{
  background:#161b22;
  border:1px solid #30363d;
  color:#e6edf3;
  padding:0 14px;
  height:32px;
  border-radius:var(--radius-sm);
  cursor:pointer;
  font-size:12px;
  font-weight:600;
  font-family:var(--font);
  display:flex;
  align-items:center;
  gap:6px;
  transition:all 0.15s;
  white-space:nowrap;
  flex-shrink:0;
}
#gh-btn:hover{background:#21262d;border-color:#8b949e}

/* ── TOOLBAR ──────────────────────────────────────────────────────────────── */
#toolbar{
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:0 14px;
  display:flex;
  gap:6px;
  align-items:center;
  flex-wrap:wrap;
  flex-shrink:0;
  min-height:var(--toolbar-h);
  row-gap:4px;
}
#srch{
  background:var(--bg);
  color:var(--text);
  border:1px solid var(--border);
  padding:6px 11px;
  border-radius:var(--radius-sm);
  font-family:var(--font);
  font-size:13px;
  width:180px;
  transition:border-color 0.15s,box-shadow 0.15s;
  outline:none;
  font-size:16px; /* prevent zoom on iOS */
}
#srch:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.sel{
  background:var(--bg);
  color:var(--text);
  border:1px solid var(--border);
  padding:6px 9px;
  border-radius:var(--radius-sm);
  font-family:var(--font);
  font-size:12px;
  cursor:pointer;
  outline:none;
  transition:border-color 0.15s;
}
.sel:focus{border-color:var(--accent)}
.btn{
  background:var(--bg4);
  color:var(--text2);
  border:1px solid var(--border);
  padding:5px 12px;
  border-radius:var(--radius-sm);
  cursor:pointer;
  font-size:12px;
  font-family:var(--font);
  font-weight:500;
  white-space:nowrap;
  transition:all 0.15s ease;
  display:flex;
  align-items:center;
  gap:4px;
}
.btn:hover{background:var(--bg5);border-color:var(--border2);color:var(--text)}
.btn.pri{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:var(--accent);color:#fff;font-weight:600}
.btn.pri:hover{background:linear-gradient(135deg,var(--accent2),var(--accent3));box-shadow:var(--shadow-accent)}
.btn.grn{background:var(--green-dim);border-color:rgba(34,197,94,0.35);color:var(--green);font-weight:600}
.btn.grn:hover{background:rgba(34,197,94,0.25);box-shadow:0 0 12px rgba(34,197,94,0.15)}
.btn.red{background:transparent;border-color:rgba(239,68,68,0.3);color:var(--red)}
.btn.red:hover{background:var(--red-dim);border-color:rgba(239,68,68,0.5);box-shadow:0 0 10px rgba(239,68,68,0.1)}
.sep{width:1px;height:22px;background:var(--border);flex-shrink:0;margin:0 2px}

/* ── BULK BAR ──────────────────────────────────────────────────────────────── */
#bbar{
  background:linear-gradient(90deg,rgba(124,58,237,0.12),rgba(109,40,217,0.08));
  border-top:1px solid var(--border3);
  border-bottom:1px solid var(--border);
  padding:7px 16px;
  display:none;
  align-items:center;
  gap:8px;
  flex-shrink:0;
  flex-wrap:wrap;
}
#bbar.vis{display:flex}
#bcnt{
  color:var(--accent);
  font-weight:700;
  font-size:12px;
  min-width:80px;
}

/* ── BODY LAYOUT ──────────────────────────────────────────────────────────── */
#body{display:flex;flex:1;overflow:hidden;position:relative}

/* ── SIDEBAR ─────────────────────────────────────────────────────────────── */
#sidebar{
  width:var(--sidebar-w);
  background:var(--bg3);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  flex-shrink:0;
  transition:width 0.25s cubic-bezier(0.4,0,0.2,1),transform 0.25s cubic-bezier(0.4,0,0.2,1);
  will-change:width;
}
#sidebar.closed{width:0;min-width:0}
#sb-inner{flex:1;overflow-y:auto;padding:10px 8px}
.sb-hdr{
  font-size:10px;
  color:var(--muted);
  letter-spacing:0.08em;
  text-transform:uppercase;
  font-weight:600;
  margin:8px 4px 6px;
}
.sb-m{
  padding:7px 8px 7px 10px;
  margin-bottom:4px;
  border-radius:var(--radius-sm);
  cursor:pointer;
  border-left:2px solid transparent;
  user-select:none;
  transition:all 0.15s;
  position:relative;
  overflow:hidden;
}
.sb-m:hover{background:var(--bg5);border-left-color:var(--border2)}
.sb-m.active{background:rgba(124,58,237,0.1);border-left-color:var(--accent)}
.sb-mname{
  font-size:12px;
  font-weight:500;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  color:var(--text);
}
.sb-m.active .sb-mname{color:#c4b5fd}
.sb-bw{height:3px;background:rgba(255,255,255,0.06);border-radius:99px;margin-top:5px;overflow:hidden}
.sb-bf{height:100%;border-radius:99px;transition:width 0.4s ease}
.sb-cnt{font-size:10px;color:var(--muted);margin-top:3px;display:flex;justify-content:space-between;align-items:center}
.sb-cnt-pct{font-weight:600;font-variant-numeric:tabular-nums}
#sb-addm{
  width:100%;
  background:none;
  border:1px dashed var(--border);
  color:var(--muted);
  padding:6px;
  border-radius:var(--radius-sm);
  cursor:pointer;
  font-size:11px;
  font-family:var(--font);
  font-weight:500;
  margin-top:8px;
  transition:all 0.15s;
}
#sb-addm:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
#oc-section{padding:10px 8px;border-top:1px solid var(--border)}
.oc-dot{font-size:11px;display:flex;align-items:center;gap:6px;font-weight:500}

/* ── SIDEBAR OVERLAY (mobile) ─────────────────────────────────────────────── */
#sidebar-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(2px);
  z-index:150;
}
#sidebar-overlay.vis{display:block}

/* ── CONTENT ────────────────────────────────────────────────────────────────── */
#content{flex:1;overflow-y:auto;padding:14px 16px}

/* ── MISSION CARDS ───────────────────────────────────────────────────────── */
.mc{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  margin-bottom:12px;
  overflow:hidden;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.mc:hover{border-color:var(--border2)}
.mc.dov{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),var(--shadow-accent)}

.mhead{
  padding:11px 14px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:8px;
  background:linear-gradient(90deg,var(--bg4) 0%,var(--bg2) 100%);
  user-select:none;
  transition:background 0.2s;
  position:relative;
}
.mhead:hover{background:linear-gradient(90deg,var(--bg5) 0%,rgba(26,26,56,0.8) 100%)}

.mdrag{
  color:var(--muted);
  cursor:grab;
  font-size:16px;
  padding:0 2px;
  transition:color 0.15s;
}
.mdrag:hover{color:var(--text2)}
.mico{font-size:10px;color:var(--muted);min-width:10px;transition:transform 0.2s}
.mname-wrap{flex:1;min-width:0}
.mname{
  font-weight:600;
  font-size:13px;
  outline:none;
  background:none;
  border:none;
  border-bottom:1px solid transparent;
  color:var(--text);
  font-family:var(--font);
  width:100%;
  cursor:pointer;
  padding:1px 0;
  transition:border-color 0.15s;
}
.mname:focus{border-bottom-color:var(--accent);cursor:text}

.mpbar{
  width:72px;
  height:8px;
  background:rgba(255,255,255,0.06);
  border-radius:99px;
  overflow:hidden;
  flex-shrink:0;
}
.mpfill{height:100%;border-radius:99px;transition:width 0.5s ease}
.mpct{
  font-size:12px;
  font-weight:700;
  color:var(--accent);
  min-width:34px;
  text-align:right;
  font-variant-numeric:tabular-nums;
}
.mcnt{
  font-size:11px;
  color:var(--muted);
  min-width:32px;
  text-align:right;
  font-variant-numeric:tabular-nums;
  font-weight:500;
}

.marr{display:flex;gap:3px;flex-shrink:0}
.marr button{
  background:none;
  border:1px solid var(--border);
  color:var(--muted);
  cursor:pointer;
  width:24px;
  height:24px;
  border-radius:var(--radius-sm);
  font-size:12px;
  line-height:1;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all 0.15s;
}
.marr button:hover{background:var(--bg5);border-color:var(--border2);color:var(--text)}

.macts{display:flex;gap:3px;opacity:0;flex-shrink:0;transition:opacity 0.15s}
.mhead:hover .macts{opacity:1}

.mb2{
  background:none;
  border:none;
  color:var(--muted);
  cursor:pointer;
  font-size:11px;
  font-family:var(--font);
  font-weight:500;
  padding:3px 7px;
  border-radius:var(--radius-sm);
  border:1px solid transparent;
  transition:all 0.15s;
  white-space:nowrap;
}
.mb2:hover{color:var(--text);background:var(--bg5);border-color:var(--border)}
.mb2.del:hover{color:var(--red);background:var(--red-dim);border-color:rgba(239,68,68,0.3)}
.mb2.run:hover{color:var(--green);background:var(--green-dim);border-color:rgba(34,197,94,0.3)}

/* Delete button pill */
.mb2.del{
  color:rgba(239,68,68,0.6);
}

.mbody{padding:8px}
.mbody.col{display:none}

.mfoot{padding:4px 8px 10px;display:flex;gap:6px}
.madd-inp{
  flex:1;
  background:var(--bg);
  color:var(--text);
  border:1px solid var(--border);
  padding:6px 10px;
  border-radius:var(--radius-sm);
  font-family:var(--font);
  font-size:13px;
  outline:none;
  transition:border-color 0.15s,box-shadow 0.15s;
  font-size:16px;
}
.madd-inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.madd-btn{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;
  border:none;
  padding:6px 14px;
  border-radius:var(--radius-sm);
  cursor:pointer;
  font-size:13px;
  font-family:var(--font);
  font-weight:600;
  transition:all 0.15s;
}
.madd-btn:hover{background:linear-gradient(135deg,var(--accent2),var(--accent3));box-shadow:var(--shadow-accent)}

/* ── TODO ITEMS ───────────────────────────────────────────────────────────── */
.ti{
  display:flex;
  align-items:flex-start;
  gap:6px;
  padding:6px 8px;
  border-radius:var(--radius-sm);
  margin-bottom:2px;
  border:1px solid transparent;
  cursor:grab;
  transition:background 0.12s,border-color 0.12s;
  min-height:36px;
}
.ti:hover{background:var(--bg4)}
.ti.dragging{opacity:0.3;will-change:transform}
.ti.dov{border-color:var(--accent);background:rgba(124,58,237,0.08)}

.ti input[type=checkbox]{
  width:15px;
  height:15px;
  margin-top:3px;
  cursor:pointer;
  accent-color:var(--accent);
  flex-shrink:0;
  border-radius:4px;
}

.tstat{
  font-size:13px;
  min-width:20px;
  cursor:pointer;
  flex-shrink:0;
  margin-top:2px;
  user-select:none;
  transition:transform 0.1s;
}
.tstat:hover{transform:scale(1.15)}
.sd{color:var(--green)}
.si{color:var(--blue)}
.sp{color:var(--muted)}

.ttext{
  flex:1;
  line-height:1.5;
  word-break:break-word;
  outline:none;
  padding:1px 4px;
  border-radius:4px;
  border:1px solid transparent;
  font-size:13px;
  transition:border-color 0.15s,background 0.15s;
}
.ttext:focus{border-color:var(--accent);background:rgba(124,58,237,0.06)}
.ttext.done{color:var(--muted);text-decoration:line-through;opacity:0.6}

.tid{
  font-size:10px;
  color:var(--muted);
  min-width:28px;
  text-align:right;
  flex-shrink:0;
  margin-top:4px;
  font-family:var(--font-mono);
  font-weight:600;
}

.tarr{display:flex;gap:2px;flex-shrink:0;opacity:0;transition:opacity 0.15s}
.ti:hover .tarr{opacity:1}
.tarr button{
  background:none;
  border:1px solid var(--border);
  color:var(--muted);
  cursor:pointer;
  width:22px;
  height:22px;
  border-radius:4px;
  font-size:11px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all 0.1s;
}
.tarr button:hover{background:var(--bg5);border-color:var(--border2);color:var(--text)}

.tacts{display:flex;gap:2px;flex-shrink:0;opacity:0;transition:opacity 0.15s}
.ti:hover .tacts{opacity:1}
.tb{
  background:none;
  border:none;
  color:var(--muted);
  cursor:pointer;
  padding:2px 5px;
  border-radius:4px;
  font-size:12px;
  line-height:1.4;
  font-family:var(--font);
  min-height:22px;
  display:flex;
  align-items:center;
  transition:all 0.1s;
}
.tb:hover{color:var(--text);background:var(--bg5)}
.tb.del:hover{color:var(--red);background:var(--red-dim)}
.tb.run:hover{color:var(--green);background:var(--green-dim)}

.empty{color:var(--muted);text-align:center;padding:28px;font-size:13px;font-weight:500}

/* ── TERMINAL DRAWER ─────────────────────────────────────────────────────── */
#term-drawer{
  background:#020208;
  border-top:1px solid var(--accent);
  flex-shrink:0;
  display:none;
  flex-direction:column;
  max-height:340px;
  box-shadow:0 -4px 24px rgba(124,58,237,0.15);
}
#term-drawer.vis{display:flex}
#term-hdr{
  background:#0a0a14;
  padding:7px 14px;
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
  border-bottom:1px solid rgba(124,58,237,0.2);
}
#term-hdr span{
  color:#a78bfa;
  font-weight:700;
  font-size:12px;
  font-family:var(--font-mono);
  flex:1;
}
#term-tabs{display:flex;gap:4px;flex:2;overflow-x:auto}
.term-tab{
  background:rgba(124,58,237,0.08);
  border:1px solid var(--border);
  color:var(--muted);
  padding:3px 10px;

.term-tab.running::before{content:'● ';color:var(--green)}
.term-tab.done::before{content:'✓ ';color:var(--muted)}

#term-body{
  flex:1;
  overflow-y:auto;
  padding:10px 16px;
  font-size:12px;
  font-family:var(--font-mono);
  line-height:1.6;

}

.term-line.sys{color:#a78bfa;text-shadow:0 0 8px rgba(167,139,250,0.3)}
#term-empty{color:var(--muted);padding:20px;text-align:center;font-size:12px;font-family:var(--font)}

#term-resize{

  inset:0;
  background:rgba(0,0,0,0.7);

  z-index:1000;

  align-items:center;

  animation:fadeIn 0.15s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.modal{

}

  font-size:16px;

}

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const GITHUB = 'https://github.com/Michaelunkai/rlp-dashboard';
const IS_LOCAL = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
let BACKEND = IS_LOCAL ? '' : null;
let WS_URL  = IS_LOCAL ? ('ws://' + location.host) : null;
const CACHE_KEY = 'rlp_state_v1';
const BACKEND_KEY = 'rlp_backend';
const BACKEND_LAST_GOOD = 'rlp_backend_last_good';
let writeQueue = JSON.parse(localStorage.getItem('rlp_write_queue')||'[]');

// Fetch with hard timeout (ms)
function fetchT(url, opts, ms=2500) {
  const ctrl = new AbortController();
  const t = setTimeout(()=>ctrl.abort(), ms);
  return fetch(url, {...(opts||{}), signal:ctrl.signal}).finally(()=>clearTimeout(t));
}

async function resolveBackend() {
  // 1. User-configured URL — instant
  const stored = localStorage.getItem(BACKEND_KEY);
  if (stored) return stored;
  // 2. Last known good URL — instant
  const lastGood = localStorage.getItem(BACKEND_LAST_GOOD);
  // 3. Tunnel config from both sources in parallel — race
  const sources = [
    '/tunnel-config.json?_='+Date.now(),
    'https://raw.githubusercontent.com/Michaelunkai/rlp-dashboard/main/public/tunnel-config.json?_='+Date.now()
  ];
  const tryFetch = src => fetchT(src,{},2000).then(r=>r.ok?r.json():null).then(d=>d&&d.tunnelUrl?d.tunnelUrl:null).catch(()=>null);
  const [r1, r2] = await Promise.all([tryFetch(sources[0]), tryFetch(sources[1])]);
  const found = r1 || r2;
  if (found) { localStorage.setItem(BACKEND_LAST_GOOD, found); return found; }
  return lastGood || null;
}

// ── STATE ─────────────────────────────────────────────────────────────────────
// Load cached state immediately so UI is populated before any network call
const _cached = localStorage.getItem(CACHE_KEY);
let state = _cached ? JSON.parse(_cached) : { todos:[], missionExplanations:{} };
let ws = null, wsAlive = false;
let searchQ = '', sfVal = 'all', mFilter = 'all';
let selIds = new Set();
let collapsed = new Set();
let dragTodoId = null, dragMission = null;
let undoStack = [];
let bots = {};
let activeBot = null;

// ── INIT ─────────────────────────────────────────────────────────────────────
(async () => {
  // Render immediately from cache — zero wait
  if (state.todos.length) render();

  document.addEventListener('keydown', onKey);
  initTermResize();

  // Offline banner
  const offBanner = document.getElementById('offline-banner');
  window.addEventListener('online',  () => { offBanner.classList.remove('vis'); replayWriteQueue(); fetchState(); });
  window.addEventListener('offline', () => offBanner.classList.add('vis'));
  if (!navigator.onLine) offBanner.classList.add('vis');

  // Register service worker
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});

  // Resolve backend (parallel fetch, ≤2.5s) then connect + fetch fresh
  if (!IS_LOCAL) {
    BACKEND = await resolveBackend(); // guaranteed ≤2.5s
    if (BACKEND) WS_URL = BACKEND.replace('https://','wss://').replace('http://','ws://');
  }
  connect();
  fetchState(); // background refresh — renders over cache when ready
  checkOC();

  // Retry cycle: every 4s if not live
  setInterval(() => { if (!wsAlive) { fetchState(); autoReconnect(); } }, 4000);
  setInterval(checkOC, 25000);
})();

async function autoReconnect() {
  const url = await resolveBackend();
  if (url && url !== BACKEND) {
    BACKEND = url; WS_URL = url.replace('https://','wss://').replace('http://','ws://');
    localStorage.setItem(BACKEND_LAST_GOOD, url);
    connect();
  }
}

// Replay queued writes after coming back online
async function replayWriteQueue() {
  if (!writeQueue.length || !BACKEND) return;
  const q = [...writeQueue]; writeQueue = [];
  localStorage.setItem('rlp_write_queue','[]');
  for (const {path, body} of q) {
    try { await fetch((BACKEND||'')+path, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); }
    catch(e) { writeQueue.push({path,body}); }
  }
  localStorage.setItem('rlp_write_queue', JSON.stringify(writeQueue));
  fetchState();
}

// ── API ───────────────────────────────────────────────────────────────────────
async function api(path, body) {
  if (body && !navigator.onLine) {
    // Queue write for when we're back online; optimistic update already applied by caller
    writeQueue.push({path, body});
    localStorage.setItem('rlp_write_queue', JSON.stringify(writeQueue));
    return {};
  }
  const r = await fetchT((BACKEND||'') + path, body ? { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) } : {}, 5000);
  return r.json();
}

async function fetchState() {
  // Try live backend first
  if (BACKEND) {
    try {
      const d = await fetchT((BACKEND||'')+'/api/rlp-state',{},4000).then(r=>r.json());
      if (d && d.todos) {
        state = d; localStorage.setItem(CACHE_KEY, JSON.stringify(d)); render(); return;
      }
    } catch(e) {}
  }
  // Fallback: read rlp-state.json directly from GitHub (always up-to-date, no server needed)
  try {
    const ghUrl = 'https://raw.githubusercontent.com/Michaelunkai/rlp-dashboard/main/public/rlp-state.json?_='+Date.now();
    const d = await fetchT(ghUrl,{},4000).then(r=>r.json());
    if (d && d.todos) {
      state = d; localStorage.setItem(CACHE_KEY, JSON.stringify(d)); render();
      setConn('poll','GitHub'); return;
    }
  } catch(e) {}
  // Last resort: render from localStorage cache
  const cached = localStorage.getItem(CACHE_KEY);
  if (cached) { try { state = JSON.parse(cached); render(); } catch(e) {} }
  setConn('dead','Offline');
}

function configBackend() {
  const u = prompt('Backend URL:', BACKEND||'');
  if (u !== null) { if (u) localStorage.setItem('rlp_backend', u); else localStorage.removeItem('rlp_backend'); location.reload(); }
}
async function triggerSync() { try { await api('/api/github/sync',{}); toast('Sync started'); } catch(e) { toast('Backend offline'); } }

// ── WEBSOCKET ─────────────────────────────────────────────────────────────────
function connect() {
  if (!WS_URL) { setConn('poll','Polling'); return; }
  try {
    ws = new WebSocket(WS_URL);
    ws.onopen = () => { wsAlive=true; setConn('live','Live'); };
    ws.onclose = () => { wsAlive=false; setConn('dead','Reconnecting'); setTimeout(connect,3000); };
    ws.onerror = () => { wsAlive=false; setConn('poll','Polling'); };
    ws.onmessage = e => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'state') { state = msg.data; render(); }
      if (msg.type === 'config' && msg.data.tunnelUrl) { BACKEND = msg.data.tunnelUrl; WS_URL = BACKEND.replace('https://','wss://').replace('http://','ws://'); }
      if (msg.type === 'bot') handleBotMsg(msg.data);
    };
  } catch(e) { setConn('poll','Polling'); }
}
function setConn(cls, lbl) { document.getElementById('dot').className=cls; document.getElementById('connlbl').textContent=lbl; }

// ── BOT MESSAGES ──────────────────────────────────────────────────────────────
function handleBotMsg({ sessionId, type, data }) {
  if (!bots[sessionId]) bots[sessionId] = { output:[], done:false, label: sessionId };
  const sess = bots[sessionId];
  if (type === 'start') {
    sess.label = data.prompt ? data.prompt.slice(0,40) + '...' : sessionId;
    sess.done = false;
    openTerm();
    activeBot = sessionId;
    renderTermTabs();
    appendTermLine(`[START] ${sess.label}`, 'sys');
    appendTermLine(`[DIR] ${data.wd||''}`, 'sys');
  }
  if (type === 'output') {
    sess.output.push(data);
    if (activeBot === sessionId) appendTermLine(data);
  }
  if (type === 'resume') { sess.output = []; appendTermLine(data); }
  if (type === 'done') {
    sess.done = true;
    appendTermLine(`[DONE] exit code ${data.code}, elapsed ${(data.elapsed/1000).toFixed(1)}s`, 'sys');
    renderTermTabs();
    fetchState(); // Refresh state after bot completes
  }
}

function openTerm() { document.getElementById('term-drawer').classList.add('vis'); document.getElementById('term-empty').style.display='none'; }
function closeTerm() { document.getElementById('term-drawer').classList.remove('vis'); }
function clearTerm() { document.getElementById('term-body').innerHTML = '<div id="term-empty" style="display:none"></div>'; }
async function stopActive() {
  if (!activeBot) return;
  try { await api('/api/bot/stop', { sessionId: activeBot }); toast('Bot stopped'); } catch(e) {}
}

function appendTermLine(text, cls) {
  const body = document.getElementById('term-body');
  text.split('\n').forEach(line => {
    if (!line.trim()) return;
    const d = document.createElement('div');
    d.className = 'term-line' + (cls ? ' '+cls : '');
    d.textContent = line;
    body.appendChild(d);
  });
  body.scrollTop = body.scrollHeight;
}

function renderTermTabs() {
  const tabs = document.getElementById('term-tabs');
  tabs.innerHTML = '';
  Object.entries(bots).slice(-6).forEach(([id, s]) => {
    const t = document.createElement('div');
    t.className = 'term-tab ' + (s.done ? 'done' : 'running') + (activeBot === id ? ' active' : '');
    t.textContent = s.label.slice(0, 25);
    t.onclick = () => {
      activeBot = id;
      clearTerm();
      s.output.forEach(l => appendTermLine(l));
      renderTermTabs();
    };
    tabs.appendChild(t);

// Terminal resize
function initTermResize() {
  const handle = document.getElementById('term-resize');
  let startY, startH;
  handle.addEventListener('mousedown', e => {
    startY = e.clientY;
    startH = document.getElementById('term-drawer').offsetHeight;
    const mm = e2 => { const h = Math.max(100, Math.min(600, startH + (startY - e2.clientY))); document.getElementById('term-drawer').style.maxHeight = h + 'px'; };
    const mu = () => { document.removeEventListener('mousemove', mm); document.removeEventListener('mouseup', mu); };
    document.addEventListener('mousemove', mm);
    document.addEventListener('mouseup', mu);
  });
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() { renderStats(); renderSidebar(); renderMissions(); updateBbar(); }

function getMissions() {
  const order = state.missionExplanations ? Object.keys(state.missionExplanations) : [];
  const map = {};
  order.forEach(m => { map[m] = []; });
  (state.todos||[]).forEach(t => {
    const m = getMission(t.text);
    if (!map[m]) map[m] = [];
    map[m].push(t);
  });
  // Keep named missions from missionExplanations even if they have zero todos
  const expKeys = state.missionExplanations ? Object.keys(state.missionExplanations) : [];
  expKeys.forEach(k => { if (!map[k]) map[k] = []; });
  // Only remove 'General' if empty
  if (map['General'] && !map['General'].length) delete map['General'];
  return map;
}

function getMission(text) {
  const m = text && text.match(/[-\u2013]\s*Mission:\s*(.+?)$/i);
  if (m) return m[1].trim();
  const m2 = text && text.match(/Mission:\s*(.+)/i);
  return m2 ? m2[1].trim() : 'General';
}

function filterTodos(todos) {
  return todos.filter(t => {
    if (sfVal !== 'all' && t.status !== sfVal) return false;
    if (searchQ && !(t.text||'').toLowerCase().includes(searchQ.toLowerCase())) return false;
    return true;
  });
}

function renderStats() {
  const todos = state.todos||[];
  const total = todos.length, done = todos.filter(t=>t.status==='done').length;
  const ip = todos.filter(t=>t.status==='in_progress').length, pend = todos.filter(t=>t.status==='pending').length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('s-t').textContent = total;
  document.getElementById('s-d').textContent = done;
  document.getElementById('s-a').textContent = ip;
  document.getElementById('s-p').textContent = pend;
  document.getElementById('bar-fill').style.width = pct+'%';
  document.getElementById('bar-fill').style.background = pct>=80?'#22c55e':pct>=40?'#eab308':'#7c3aed';
  document.getElementById('bar-pct').textContent = pct+'%';
}

function renderSidebar() {
  const missions = getMissions();
  const el = document.getElementById('sb-list');
  el.innerHTML = '';
  Object.entries(missions).forEach(([name, todos]) => {
    const done = todos.filter(t=>t.status==='done').length;
    const pct = todos.length ? Math.round(done/todos.length*100) : 0;
    const color = pct>=80?'#22c55e':pct>=40?'#eab308':'#ef4444';
    const div = document.createElement('div');
    div.className = 'sb-m' + (mFilter===name?' active':'');
    div.innerHTML = `<div class="sb-mname" title="${xe(name)}">${xe(name)}</div>
      <div class="sb-bw"><div class="sb-bf" style="width:${pct}%;background:${color}"></div></div>
      <div class="sb-cnt"><span>${done}/${todos.length}</span><span class="sb-cnt-pct" style="color:${color}">${pct}%</span></div>`;
    div.onclick = () => { mFilter = mFilter===name?'all':name; render(); };
    el.appendChild(div);
  });
}

function renderMissions() {
  const missions = getMissions();
  const wrap = document.getElementById('mc-wrap');
  wrap.innerHTML = '';
  const toShow = mFilter==='all' ? Object.entries(missions) : (missions[mFilter] ? [[mFilter, missions[mFilter]]] : []);
  if (!toShow.length) { wrap.innerHTML = '<div class="empty">No todos match filters.</div>'; return; }
  toShow.forEach(([name, todos]) => {
    const filt = filterTodos(todos);
    const done = todos.filter(t=>t.status==='done').length;
    const pct = todos.length ? Math.round(done/todos.length*100) : 0;
    const col = pct>=80?'#22c55e':pct>=40?'#eab308':'#ef4444';
    const isCol = collapsed.has(name);
    const mc = document.createElement('div');
    mc.className = 'mc'; mc.dataset.mission = name;
    mc.setAttribute('draggable','true');
    mc.innerHTML = `<div class="mhead">
      <span class="mdrag" title="Drag to reorder">&#8597;</span>
      <span class="mico">${isCol?'&#9654;':'&#9660;'}</span>
      <div class="mname-wrap">
        <div class="mname" contenteditable="true" data-mission="${xe(name)}" onblur="saveMName(this)" onclick="event.stopPropagation()">${xe(name)}</div>
      </div>
      <div class="mpbar"><div class="mpfill" style="width:${pct}%;background:${col}"></div></div>
      <span class="mpct" style="color:${col}">${pct}%</span>
      <span class="mcnt">${done}/${todos.length}</span>
      <div class="marr" onclick="event.stopPropagation()">
        <button data-maction="up" title="Move mission up">&#8593;</button>
        <button data-maction="dn" title="Move mission down">&#8595;</button>
      </div>
      <div class="macts" onclick="event.stopPropagation()">
        <button class="mb2 run" data-maction="run" title="Run all pending">&#9654; Run</button>
        <button class="mb2" data-maction="done" title="Mark all done">&#10003; All</button>
        <button class="mb2" data-maction="pending" title="Mark all pending">&#9633; All</button>
        <button class="mb2" data-maction="add" title="Add todo">+ Add</button>
        <button class="mb2 del" data-maction="del" title="Delete mission">&#10005; Del</button>
      </div>
    </div>
    <div class="mbody${isCol?' col':''}" id="mb-${CSS.escape(name)}">
      ${filt.length===0&&searchQ?'<div class="empty">No matches.</div>':filt.map(t=>todoHTML(t,name)).join('')}
      <div class="mfoot">
        <input class="madd-inp" type="text" placeholder="Quick add todo to ${xe(name)}..." id="qa-${CSS.escape(name)}">
        <button class="madd-btn" data-maction="qaAdd">+</button>
      </div>
    </div>`;
    // mission action buttons (safe: name captured from closure, no string serialization)
    mc.querySelectorAll('[data-maction]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const act = btn.dataset.maction;
        if (act === 'up') missionUp(name);
        else if (act === 'dn') missionDn(name);
        else if (act === 'run') runMission(name);
        else if (act === 'done') mBulk(name, 'done');
        else if (act === 'pending') mBulk(name, 'pending');
        else if (act === 'add') openAddTodo(name);
        else if (act === 'del') delMission(name);
        else if (act === 'qaAdd') qaAdd(name);
      });
    });
    // qaAdd on Enter key for the quick-add input
    const qaInp = mc.querySelector('.madd-inp');
    if (qaInp) qaInp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); qaAdd(name); } });
    // mission head click
    mc.querySelector('.mhead').addEventListener('click', e => {
      if (e.target.closest('.macts,.marr,.mname')) return;
      toggleCol(name);
    });
    // mission drag
    mc.addEventListener('dragstart', e => {
      if (!e.target.classList.contains('mdrag') && !e.target.closest('.mdrag')) { e.preventDefault(); return; }
      dragMission = name; mc.style.opacity='.4'; e.stopPropagation();
    });
    mc.addEventListener('dragend', () => { mc.style.opacity=''; dragMission=null; });
    mc.addEventListener('dragover', e => { e.preventDefault(); e.stopPropagation(); if (dragMission&&dragMission!==name) mc.classList.add('dov'); });
    mc.addEventListener('dragleave', () => mc.classList.remove('dov'));
    mc.addEventListener('drop', e => {
      e.preventDefault(); e.stopPropagation(); mc.classList.remove('dov');
      if (!dragMission||dragMission===name) return;
      const names = Object.keys(getMissions());
      const si=names.indexOf(dragMission), ti=names.indexOf(name);
      if (si<0||ti<0) return;
      names.splice(si,1); names.splice(ti,0,dragMission);
      api('/api/mission/reorder',{names}).then(fetchState);
    });
    wrap.appendChild(mc);
    mc.querySelectorAll('.ti').forEach(attachDrag);
  });
}

function todoHTML(t, mission) {
  const si = t.status==='done' ? '<span class="tstat sd" title="Click to cycle">✓</span>'
    : t.status==='in_progress' ? '<span class="tstat si" title="Click to cycle">▶</span>'
    : '<span class="tstat sp" title="Click to cycle">○</span>';
  const tc = 'ttext'+(t.status==='done'?' done':'');
  const short = (t.text||'').replace(/\s*[-\u2013]\s*Mission:\s*.+$/i,'').substring(0,300);
  const chk = selIds.has(t.id)?'checked':'';
  return `<div class="ti" draggable="true" data-id="${t.id}" data-mission="${xe(mission)}">
    <input type="checkbox" ${chk} onchange="toggleSel(${t.id},this.checked)">
    <span onclick="cycleTodo(${t.id})">${si}</span>
    <div class="${tc}" contenteditable="true" data-eid="${t.id}" onblur="saveText(this)"
      title="${xe(t.text||'')}">${xe(short)}</div>
    <span class="tid">#${t.id}</span>
    <div class="tarr">
      <button onclick="todoUp(${t.id})" title="Move up">&#8593;</button>
      <button onclick="todoDn(${t.id})" title="Move down">&#8595;</button>
      <button onclick="todoTop(${t.id})" title="Move to top">&#8657;</button>
    </div>
    <div class="tacts">
      <button class="tb" onclick="markTodo(${t.id},'done')" title="Done">&#10003;</button>
      <button class="tb" onclick="markTodo(${t.id},'in_progress')" title="Active">&#9654;</button>
      <button class="tb" onclick="markTodo(${t.id},'pending')" title="Pending">&#9633;</button>
      <button class="tb" onclick="openMove(${t.id})" title="Move to mission">&#10142;</button>
      <button class="tb run" onclick="runTodo(${t.id})" title="Run with bot">&#9654;&#9654;</button>
      <button class="tb del" onclick="delTodo(${t.id})" title="Delete">&#10005;</button>
    </div>
  </div>`;
}

// ── TODO DRAG ─────────────────────────────────────────────────────────────────
function attachDrag(el) {
  el.addEventListener('dragstart', e => { dragTodoId=parseInt(el.dataset.id); el.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; e.stopPropagation(); });
  el.addEventListener('dragend', () => { el.classList.remove('dragging'); document.querySelectorAll('.ti').forEach(i=>i.classList.remove('dov')); dragTodoId=null; });
  el.addEventListener('dragover', e => { e.preventDefault(); e.stopPropagation(); if (dragTodoId!==null) el.classList.add('dov'); });
  el.addEventListener('dragleave', () => el.classList.remove('dov'));
  el.addEventListener('drop', e => {
    e.preventDefault(); e.stopPropagation(); el.classList.remove('dov');
    const tid = parseInt(el.dataset.id);
    if (!dragTodoId||dragTodoId===tid) return;
    // Check cross-mission drop
    const srcMission = getMission(state.todos.find(t=>t.id===dragTodoId)?.text||'');
    const tgtMission = el.dataset.mission;
    if (srcMission !== tgtMission && tgtMission) {
      // Move to target mission then reorder
      api('/api/todo/move', { id: dragTodoId, mission: tgtMission }).then(() => reorderDrop(dragTodoId, tid));
    } else {
      reorderDrop(dragTodoId, tid);
    }
  });
}

function reorderDrop(srcId, tgtId) {
  const si = state.todos.findIndex(t=>t.id===srcId), ti = state.todos.findIndex(t=>t.id===tgtId);
  if (si<0||ti<0) return;
  const [item] = state.todos.splice(si,1);
  state.todos.splice(ti,0,item);
  render();
  api('/api/todo/reorder', { ids: state.todos.map(t=>t.id) });
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function toggleCol(name) { if (collapsed.has(name)) collapsed.delete(name); else collapsed.add(name); renderMissions(); }
function collapseAll() { Object.keys(getMissions()).forEach(m => collapsed.add(m)); renderMissions(); }
function expandAll() { collapsed.clear(); renderMissions(); }

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebar-overlay');
  if (window.innerWidth <= 768) {
    const isOpen = sb.classList.contains('open');
    if (isOpen) { sb.classList.remove('open'); ov.classList.remove('vis'); }
    else { sb.classList.add('open'); sb.classList.remove('closed'); ov.classList.add('vis'); }
  } else {
    sb.classList.toggle('closed');
  }
}

function closeSidebarMobile() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('vis');
}

function cycleTodo(id) {
  const t = state.todos.find(x=>x.id===id); if (!t) return;
  const cycle = { pending:'in_progress', in_progress:'done', done:'pending' };
  pushUndo({ action:'mark', id, prev:t.status });
  t.status = cycle[t.status]||'pending';
  render();
  api('/api/todo/mark', { id, status: t.status });
}

function markTodo(id, status) {
  const t = state.todos.find(x=>x.id===id); if (!t) return;
  pushUndo({ action:'mark', id, prev:t.status });
  t.status = status; render();
  api('/api/todo/mark', { id, status });
}

function todoUp(id) { api('/api/todo/move-up',{id}).then(fetchState); }
function todoDn(id) { api('/api/todo/move-down',{id}).then(fetchState); }
function todoTop(id) { api('/api/todo/move-to-top',{id}).then(fetchState); }
function missionUp(name) { api('/api/mission/move-up',{name}).then(fetchState); }
function missionDn(name) { api('/api/mission/move-down',{name}).then(fetchState); }

function saveText(el) {
  const id = parseInt(el.dataset.eid);
  const t = state.todos.find(x=>x.id===id); if (!t) return;
  const mission = getMission(t.text);
  const newText = el.textContent.trim() + ` - Mission: ${mission}`;
  api('/api/todo/update-text', { id, text: newText });
}

function saveMName(el) {
  const oldName = el.dataset.mission;
  const newName = el.textContent.trim();
  if (!newName||newName===oldName) return;
  api('/api/mission/rename', { oldName, newName }).then(fetchState);
  toast(`Renamed "${oldName}" -> "${newName}"`);
}

function delTodo(id) {
  const t = state.todos.find(x=>x.id===id); if (!t) return;
  pushUndo({ action:'restore', todo: JSON.parse(JSON.stringify(t)) });
  state.todos = state.todos.filter(x=>x.id!==id);
  render();
  api('/api/todo/delete', { id });
  toast(`#${id} deleted — Ctrl+Z undo`);
}

function delMission(name) {
  const cnt = (getMissions()[name]||[]).length;
  let deleteTodos = false;
  if (cnt > 0) {
    const choice = confirm(`Delete "${name}" and its ${cnt} todos?\nOK = delete todos too, Cancel = keep todos (just remove mission)`);
    if (choice === null) return; // dismissed (some browsers)
    deleteTodos = choice === true;
  } else {
    const ok = confirm(`Delete empty mission "${name}"?`);
    if (!ok) return;
  }
  api('/api/mission/delete', { name, deleteTodos }).then(fetchState);
  toast(`Mission "${name}" deleted`);
}

function mBulk(mission, status) {
  const ids = (getMissions()[mission]||[]).map(t=>t.id);
  ids.forEach(id => { const t=state.todos.find(x=>x.id===id); if(t) t.status=status; });
  render();
  api('/api/todo/bulk', { ids, action: status });
}

async function qaAdd(mission) {
  const inp = document.getElementById(`qa-${CSS.escape(mission)}`);
  const text = inp?.value.trim(); if (!text) return;
  await api('/api/todo/add', { text, mission });
  if (inp) inp.value = '';
  fetchState(); toast('Added');
}

function clearDone() {
  const ids = state.todos.filter(t=>t.status==='done').map(t=>t.id);
  if (!ids.length) { toast('No done todos'); return; }
  if (!confirm(`Remove ${ids.length} done todos?`)) return;
  state.todos = state.todos.filter(t=>t.status!=='done');
  render();
  api('/api/todo/bulk', { ids, action:'delete' });
  toast(`Cleared ${ids.length} done todos`);
}

// ── BOT RUN ───────────────────────────────────────────────────────────────────
async function runTodo(id) {
  const t = state.todos.find(x=>x.id===id);
  if (!t) return;
  openTerm();
  try {
    const r = await api('/api/bot/run', { todoId: id });
    if (r.ok) { activeBot = r.sessionId; bots[r.sessionId] = { output:[], done:false, label:`#${id} ${t.text.slice(0,30)}` }; renderTermTabs(); toast(`Bot started for #${id}`); }
    else toast('Bot failed: ' + (r.error||'unknown'));
  } catch(e) { toast('Backend offline — cannot run bot'); }
}

async function runMission(mission) {
  openTerm();
  try {
    const r = await api('/api/bot/run', { mission });
    if (r.ok) { activeBot = r.sessionId; bots[r.sessionId] = { output:[], done:false, label:`Mission: ${mission}` }; renderTermTabs(); toast(`Bot started for mission "${mission}"`); }
    else toast('Bot failed: ' + (r.error||'unknown'));
  } catch(e) { toast('Backend offline'); }
}

// ── BULK SELECT ───────────────────────────────────────────────────────────────
function toggleSel(id, checked) { if (checked) selIds.add(id); else selIds.delete(id); updateBbar(); }
function clearSel() { selIds.clear(); render(); }
function updateBbar() {
  const bar = document.getElementById('bbar'), cnt = selIds.size;
  if (cnt>0) { bar.classList.add('vis'); document.getElementById('bcnt').textContent=cnt+' selected'; }
  else bar.classList.remove('vis');
}
async function bulk(action) {
  const ids = [...selIds]; if (!ids.length) return;
  if (action==='delete' && !confirm(`Delete ${ids.length} todos?`)) return;
  if (action==='run') {
    for (const id of ids.slice(0,5)) await runTodo(id); // run up to 5
    selIds.clear(); render(); return;
  }
  if (action==='delete') state.todos = state.todos.filter(t=>!selIds.has(t.id));
  else if (['done','pending','in_progress'].includes(action)) state.todos.forEach(t=>{ if(selIds.has(t.id)) t.status=action; });
  selIds.clear(); render();
  api('/api/todo/bulk', { ids, action });
  toast(`Bulk ${action} applied to ${ids.length} todos`);
}

// ── MODALS ────────────────────────────────────────────────────────────────────
function openAddTodo(defMission) {

    const text = document.getElementById('m-txt').value.trim();
    const mission = document.getElementById('m-msn').value;
    const status = document.getElementById('m-sts').value;

function openAddMission() {
  modal('Add Mission', `
    <label>Mission Name</label><input id="m-mn" type="text" placeholder="e.g. Deploy Backend">
    <label>Goal (optional)</label><textarea id="m-mg" rows="2" style="resize:vertical" placeholder="Describe the goal..."></textarea>

function openMove(id) {
  const missions = Object.keys(getMissions());
  const opts = missions.map(m=>`<option>${xe(m)}</option>`).join('');
  modal('Move Todo', `<label>Move #${id} to:</label><select id="m-mv">${opts}</select>`, async () => {
    const mission = document.getElementById('m-mv').value;
    await api('/api/todo/move', { id, mission });
    fetchState(); toast(`#${id} moved to "${mission}"`);
  });
}

function openBulkMove() {
  const missions = Object.keys(getMissions());
  const opts = missions.map(m=>`<option>${xe(m)}</option>`).join('');
  modal('Move Selected', `<label>Move ${selIds.size} todos to:</label><select id="m-bm">${opts}</select>`, async () => {
    const mission = document.getElementById('m-bm').value;
    const ids = [...selIds];
    await api('/api/todo/bulk', { ids, action:'move', mission });
    selIds.clear(); fetchState(); toast(`Moved ${ids.length} todos`);
  });
}

function modal(title, body, onOk) {
  document.getElementById('__modal')?.remove();
  const ov = document.createElement('div');
  ov.id='__modal'; ov.className='modal-ov';
  ov.innerHTML=`<div class="modal"><h2>${xe(title)}</h2>${body}<div class="mbtns">
    <button class="mcancel" onclick="document.getElementById('__modal').remove()">Cancel</button>
    <button class="mok" id="__mok">OK</button></div></div>`;
  ov.addEventListener('click', e=>{ if(e.target===ov) ov.remove(); });
  document.body.appendChild(ov);
  document.getElementById('__mok').onclick = () => { onOk(); ov.remove(); };
}

function exportJSON() { dl(JSON.stringify(state,null,2),'rlp-state.json','application/json'); }
function exportMD() {
  const m = getMissions();

function onSearch(q) { searchQ=q; renderMissions(); }
function onFilter() { sfVal=document.getElementById('sf').value; renderMissions(); }

// ── OPENCLAW ──────────────────────────────────────────────────────────────────
async function checkOC() {
  try {
    const d = await api('/api/openclaw/status');
    const el = document.getElementById('oc-st');
    if (d.status==='offline'||d.error) { el.style.color='var(--red)'; el.innerHTML='<span style="font-size:8px">●</span> Offline'; }
    else { el.style.color='var(--green)'; el.innerHTML='<span style="font-size:8px">●</span> Connected'; }
  } catch(e) {}
}

// ── UNDO ─────────────────────────────────────────────────────────────────────
function pushUndo(cmd) { undoStack.push(cmd); if (undoStack.length>30) undoStack.shift(); }
async function undo() {
  const cmd = undoStack.pop(); if (!cmd) return;
  if (cmd.action==='mark') { await api('/api/todo/mark',{id:cmd.id,status:cmd.prev}); fetchState(); }
  if (cmd.action==='restore') { await api('/api/todo/add',{text:cmd.todo.text,status:cmd.todo.status}); fetchState(); }
  toast('Undone');
}

// ── KEYBOARD ─────────────────────────────────────────────────────────────────
function onKey(e) {
  if (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.isContentEditable) return;
  if (e.ctrlKey&&e.key==='z') { e.preventDefault(); undo(); }
  if (e.key==='/') { e.preventDefault(); document.getElementById('srch').focus(); }
  if (e.key==='Escape') { clearSel(); document.getElementById('srch').value=''; searchQ=''; renderMissions(); }
  if (e.ctrlKey&&e.key==='n') { e.preventDefault(); openAddTodo(); }
  if (e.key==='t'&&e.ctrlKey) { e.preventDefault(); document.getElementById('term-drawer').classList.toggle('vis'); }
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function xe(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function toast(msg, dur=2800) {
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), dur);
}
</script>
